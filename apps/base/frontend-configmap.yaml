apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>E-commerce Platform Dev</title>
      <style>
        body {
          font-family: Inter, Arial, sans-serif;
          margin: 0;
          background: #f8fafc;
          color: #0f172a;
        }
        .wrap {
          max-width: 960px;
          margin: 0 auto;
          padding: 48px 24px;
        }
        .hero {
          background: white;
          border: 1px solid #e2e8f0;
          border-radius: 20px;
          padding: 32px;
          box-shadow: 0 8px 30px rgba(15, 23, 42, 0.06);
        }
        .badge {
          display: inline-block;
          padding: 8px 12px;
          border-radius: 999px;
          background: #dbeafe;
          color: #1d4ed8;
          font-weight: 600;
          font-size: 14px;
        }
        h1 {
          font-size: 40px;
          margin: 16px 0 12px;
        }
        p {
          font-size: 18px;
          line-height: 1.6;
          color: #334155;
        }
        .grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
          gap: 16px;
          margin-top: 28px;
        }
        .card {
          background: white;
          border: 1px solid #e2e8f0;
          border-radius: 16px;
          padding: 20px;
        }
        .card h3 {
          margin-top: 0;
          margin-bottom: 8px;
        }
        .ok {
          color: #15803d;
          font-weight: 700;
        }
        code {
          background: #eff6ff;
          padding: 2px 6px;
          border-radius: 6px;
        }
      </style>
    </head>
    <body>
      <div class="wrap">
        <div class="hero">
          <span class="badge">Kubernetes • Argo CD • GitOps</span>
          <h1>E-commerce Platform - Dev</h1>
          <p>
            Production-like Kubernetes platform running on kind with GitOps,
            ingress, data services and progressive platform capabilities.
          </p>

          <div class="grid">
            <div class="card">
              <h3>Environment</h3>
              <p><span class="ok">DEV</span></p>
            </div>
            <div class="card">
              <h3>Frontend</h3>
              <p>Nginx static UI</p>
            </div>
            <div class="card">
              <h3>Backend</h3>
              <p><code>productcatalog</code> service deployed</p>
            </div>
            <div class="card">
              <h3>Data</h3>
              <p><code>redis</code> service deployed</p>
            </div>
          </div>
        </div>
      </div>
    </body>
    </html>
